<!-- Demonstrate Grid Row-Col  -->

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width", initial-scale="1">
    <title>BS grid row-col</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <p>grid col</p>
    <div class="container border">
        <div class="row">
            <div class="col">Box 1</div>
            <div class="col">Box 2</div>
            <div class="col">Box 3</div>
        </div>
    </div>
    <br> <br>

    <!-- fixed col  -->
    <p>fixed column (col-4)</p>
    <div class="container border">
        <div class="row">
            <div class="col-4">Col 1</div>
            <div class="col-4">Col 2</div>
            <div class="col-4">Col 3</div>
        </div>
    </div>

</body>

</html>
