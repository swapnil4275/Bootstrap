<!-- create demo webpage for card  -->

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width" , initial-scale="1">
    <title>Card Demo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-4">
                <div class="card">
                    <img src="../Bootstrap/images/premium_photo-1684175656320-5c3f701c082c.avif" alt="flat"
                        class="img-thumbnail img-fluid">
                    <div class="card-body">
                        <div class="card-title">2 bhk flat.</div>
                        <div class="card-text">rent - 25000 ~/</div>
                        <button class="btn btn-primary">contact-91********</button>
                    </div>
                </div>
            </div>

            <div class="col-4">
                <div class="card">
                    <img src="../Bootstrap/images/premium_photo-1661908377130-772731de98f6.avif" alt="house"
                        class="img-fluid">
                    <div class="card-body card-img-overlay text-white ms-2">
                        <div class="card-title">3 bhk House.</div>
                        <div class="card-text">price - 50 Lac.</div>
                        <button class="btn btn-primary">contact-91********</button>
                    </div>
                </div>
            </div>

            <div class="col-4">
                <div class="card">
                    <img src="../Bootstrap/images/images.jpeg" alt="land" class="img-fluid img-thumbnail">
                    <div class="card-body">
                        <div class="card-title">1 acre Land.</div>
                        <div class="card-text">price - 2 cr.</div>
                        <button class="btn btn-primary">contact-91********</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
