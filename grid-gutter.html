<!-- Demonstrate Grid Gutter (Gap)  -->
 <!-- Horizontal (gx-*) & Vertical (gy-*)  -->

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width" , initial-scale="1">
    <title>grid gutter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <p>grid gutter (gap)</p>
    <div class="container">
        <div class="row g-5">
            <div class="col">
                <div class="border bg-info">A</div>
            </div>
            <div class="col">
                <div class="border bg-info">B</div>
            </div>
        </div>
    </div>
    <br>

    <!-- Horizontal Gap  -->
    <p>horizontal gap - gx-5</p>
    <div class="container">
        <div class="row gx-5">
            <div class="col">
                <div class="border bg-success">A</div>
            </div>
            <div class="col">
                <div class="border bg-success">B</div>
            </div>
        </div>
    </div>
    <br>

    <!-- Vertical Gap  -->
    <p>Vertical gap - gy-5</p>
    <div class="container">
        <div class="row gy-5">
            <div class="col-12">
                <div class="border bg-warning">A</div>
            </div>
            <div class="col-12">
                <div class="border bg-warning">B</div>
            </div>
        </div>
    </div>

</body>

</html>
