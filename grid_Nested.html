<!-- Demonstrate Grid Nested  -->

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width" , initial-scale="1.0">
    <title>grid nested</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="container">
        <div class="row border text-center bg-primary g-5">

            <div class="col-6 border">Group - A
                <div class="row bg-info">

                    <div class="col-3 border">Brazil</div>
                    <div class="col-3 border">Morocco</div>
                    <div class="col-3 border">Haiti</div>
                    <div class="col-3 border">Scotland</div>

                </div>
            </div>

            <div class="col-6 border">Group - B
                <div class="row bg-info">

                    <div class="col-3 border">Argentina</div>
                    <div class="col-3 border">Algeria</div>
                    <div class="col-3 border">Austria</div>
                    <div class="col-3 border">Jorden</div>

                </div>
            </div>

        </div>
    </div>

</body>

</html>
